<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHR Booking App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        th { position: relative; }
        .resizer {
            position: absolute;
            top: 0;
            right: 0;
            width: 6px;
            cursor: col-resize;
            user-select: none;
            height: 100%;
            z-index: 10;
        }
        .resizer:hover, .resizing {
            background-color: #3b82f6;
        }
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            .no-print, button, input[type="checkbox"], th:last-child, td:last-child, .resizer, #login-screen { display: none !important; }
            input[type="text"], input[type="number"] { background: transparent !important; color: black !important; border: none !important; padding: 0 !important; width: 100% !important; }
            .layout-container { max-width: 100% !important; box-shadow: none !important; border: none !important; }
            div, table, tr, td, th { background-color: transparent !important; color: black !important; border-color: #cbd5e1 !important; }
            #history-log-container { max-height: none !important; overflow-y: visible !important; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-3 md:p-6 select-none">

    <div id="login-screen" style="display: flex;" class="fixed inset-0 bg-slate-950 items-center justify-center z-50 p-4">
        <div class="bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-700 shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-white tracking-tight">MHR Secure Access</h2>
                <p class="text-xs text-slate-400 mt-1">Please authenticate to manage cloud data</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500 text-sm" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-blue-500 text-sm" placeholder="••••••••">
                </div>
                <div id="login-error" style="display: none;" class="text-rose-400 text-xs font-medium bg-rose-950/40 p-2.5 rounded-lg border border-rose-900/50 text-center">
                    Invalid username or password.
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-xl transition-all shadow-md">
                    Sign In
